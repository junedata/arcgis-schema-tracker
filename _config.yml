title: "ArcGIS Schema Tracker"
description: "Tracking schema changes in public ArcGIS datasets. Subscribe to be notified when a field is added, renamed, or removed."
baseurl: "/arcgis-schema-tracker"
url: "https://junedata.github.io"

# Build
markdown: kramdown
highlighter: rouge
permalink: /posts/:year/:month/:day/:title/

# Exclude files that shouldn't be part of the site
exclude:
  - "*.py"
  - config.yaml
  - config.sample.yaml
  - "*.log"
  - schemas/
  - README.md

# Theme (GitHub Pages default)
theme: minima

# Drafts: run `jekyll serve --drafts` locally to preview unpublished posts.
# Posts with `draft: true` in frontmatter are excluded from the live site.
show_drafts: false

# Feed (used by Buttondown and any RSS reader)
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Feed settings
feed:
  path: feed.xml
  posts_limit: 20

# SEO
# author:
  # name: ""   # TODO: your name or org name
  # email: ""  # TODO: contact email (optional)

# Navigation shown on site (optional, theme-dependent)
nav:
  - title: Posts
    url: /arcgis-schema-tracker/
  - title: Schemas
    url: https://github.com/junedata/arcgis-schema-tracker/tree/main/schemas
  - title: Subscribe (RSS)
    url: /arcgis-schema-tracker/feed.xml
